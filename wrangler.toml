name = "bwfnotify"
main = "src/index.ts"
compatibility_date = "2026-05-29"

[triggers]
crons = ["*/1 * * * *"]

[vars]
BWF_LIVE_URL = "https://extranet-lv.bwfbadminton.com/api/match-center/vue-current-live"
BWF_DAY_MATCHES_URL = "https://extranet-lv.bwfbadminton.com/api/tournaments/day-matches"
BWF_REFERER = "https://bwfbadminton.com/"
BWF_USER_AGENT = "Mozilla/5.0 (Macintosh; Intel Mac OS X 14_0) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
BWF_MATCH_ORDER = "2"
BWF_MATCH_COURT = "0"
TARGET_COUNTRY_CODES = "JPN"
MAX_DISCORD_MESSAGES_PER_RUN = "20"
NOTIFIED_TTL_SECONDS = "2592000"

[[kv_namespaces]]
binding = "NOTIFIED_MATCHES"
# Replace these with the IDs printed by:
#   npx wrangler kv namespace create NOTIFIED_MATCHES
#   npx wrangler kv namespace create NOTIFIED_MATCHES --preview
id = "replace-with-your-kv-namespace-id"
preview_id = "replace-with-your-preview-kv-namespace-id"
